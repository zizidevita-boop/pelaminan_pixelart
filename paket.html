<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paket Pelaminan | Pelaminan PixelArt</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body class="lux-bg text-white">
    <header
      class="fixed top-0 left-0 w-full z-50 bg-black/50 backdrop-blur-xl border-b border-white/10"
    >
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <a href="index.html" class="text-2xl font-extrabold text-yellow-400">
          Pelaminan <span class="text-white">PixelArt</span>
        </a>

        <nav class="hidden md:flex gap-8 text-sm font-bold">
          <a href="index.html" class="hover:text-yellow-400 transition">Home</a>
          <a href="paket.html" class="text-yellow-400">Paket</a>
          <a href="galeri.html" class="hover:text-yellow-400 transition"
            >Galeri</a
          >
          <a href="kontak.html" class="hover:text-yellow-400 transition"
            >Kontak</a
          >
        </nav>

        <button id="menuBtn" class="md:hidden text-2xl">☰</button>
      </div>

      <div
        id="mobileMenu"
        class="hidden md:hidden bg-black/70 border-t border-white/10"
      >
        <div class="flex flex-col p-6 gap-4 text-sm font-bold">
          <a href="index.html" class="hover:text-yellow-400 transition">Home</a>
          <a href="paket.html" class="text-yellow-400">Paket</a>
          <a href="galeri.html" class="hover:text-yellow-400 transition"
            >Galeri</a
          >
          <a href="kontak.html" class="hover:text-yellow-400 transition"
            >Kontak</a
          >
        </div>
      </div>
    </header>

    <section class="pt-36 pb-20 px-6">
      <div class="max-w-7xl mx-auto reveal">
        <div class="text-center mb-14">
          <h1 class="text-4xl font-extrabold text-yellow-400">
            Paket Pelaminan
          </h1>
          <p class="text-white/70 mt-3 max-w-2xl mx-auto">
            Semua paket bisa custom sesuai tema impian kamu.
          </p>
        </div>

        <div id="paketContainer" class="grid md:grid-cols-3 gap-10"></div>
      </div>
    </section>

    <footer class="py-10 border-t border-white/10 bg-black/40">
      <div class="max-w-7xl mx-auto px-6 text-center">
        <h3 class="text-xl font-extrabold text-yellow-400">
          Pelaminan PixelArt
        </h3>
        <p class="text-white/60 text-sm mt-2">
          Luxury Wedding Decoration | Modern | Adat | Royal
        </p>
        <p class="text-white/40 text-xs mt-6">
          © 2026 Pelaminan PixelArt. All Rights Reserved.
        </p>
      </div>
    </footer>

    <script src="assets/js/database.js"></script>
    <script src="assets/js/app.js"></script>

    <script>
      const paket = getData("paket");
      const container = document.getElementById("paketContainer");

      paket.forEach((p) => {
        container.innerHTML += `
        <div class="glass p-8 rounded-3xl border border-white/10 hover:border-yellow-400/50 transition hover:scale-105 duration-300">
          <h3 class="text-2xl font-extrabold text-yellow-400">${p.nama}</h3>
          <p class="mt-5 text-4xl font-extrabold">Rp ${Number(p.harga).toLocaleString("id-ID")}</p>
          <p class="text-white/60 text-sm">Mulai dari</p>

          <p class="mt-5 text-white/70 text-sm leading-relaxed">${p.fitur}</p>

          <a href="kontak.html"
            class="block mt-8 text-center px-6 py-3 rounded-full bg-yellow-400 text-black font-bold hover:bg-yellow-500 transition shadow-xl">
            Booking Paket
          </a>
        </div>
      `;
      });
    </script>
  </body>
</html>
