<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Pelaminan PixelArt</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body class="lux-bg text-white min-h-screen">
    <div class="flex">
      <aside
        class="w-72 min-h-screen glass border-r border-white/10 p-6 hidden md:block"
      >
        <h2 class="text-2xl font-extrabold shimmer-text">Admin Panel</h2>
        <p class="text-white/60 text-sm mt-2">Pelaminan PixelArt</p>

        <nav class="mt-10 space-y-3 text-sm">
          <button
            onclick="showSection('dashboard')"
            class="w-full text-left px-4 py-3 rounded-xl bg-white/5 hover:bg-yellow-400 hover:text-black transition font-bold"
          >
            📊 Dashboard
          </button>
          <button
            onclick="showSection('booking')"
            class="w-full text-left px-4 py-3 rounded-xl bg-white/5 hover:bg-yellow-400 hover:text-black transition font-bold"
          >
            📩 Booking
          </button>
          <button
            onclick="showSection('paket')"
            class="w-full text-left px-4 py-3 rounded-xl bg-white/5 hover:bg-yellow-400 hover:text-black transition font-bold"
          >
            💰 Paket
          </button>
          <button
            onclick="showSection('galeri')"
            class="w-full text-left px-4 py-3 rounded-xl bg-white/5 hover:bg-yellow-400 hover:text-black transition font-bold"
          >
            🖼 Galeri
          </button>
          <button
            onclick="showSection('testimoni')"
            class="w-full text-left px-4 py-3 rounded-xl bg-white/5 hover:bg-yellow-400 hover:text-black transition font-bold"
          >
            ⭐ Testimoni
          </button>
          <button
            onclick="logoutAdmin()"
            class="w-full text-left px-4 py-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-bold"
          >
            🚪 Logout
          </button>
        </nav>
      </aside>

      <main class="flex-1 p-6 md:p-10">
        <div class="flex items-center justify-between mb-8">
          <h1 class="text-3xl font-extrabold text-yellow-400">
            Dashboard Admin
          </h1>
          <a
            href="index.html"
            target="_blank"
            class="px-6 py-3 rounded-full bg-yellow-400 text-black font-bold hover:bg-yellow-500 transition"
          >
            Lihat Website
          </a>
        </div>

        <section id="dashboardSection" class="glass p-8 rounded-3xl reveal">
          <h2 class="text-2xl font-bold text-yellow-400">Statistik Cepat</h2>
          <p class="text-white/60 text-sm mt-2">Ringkasan data bisnis</p>

          <div class="grid md:grid-cols-4 gap-6 mt-8">
            <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
              <h3 class="text-white/70 text-sm">Total Booking</h3>
              <p
                id="totalBooking"
                class="text-3xl font-extrabold text-yellow-400 mt-2"
              >
                0
              </p>
            </div>
            <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
              <h3 class="text-white/70 text-sm">Total Paket</h3>
              <p
                id="totalPaket"
                class="text-3xl font-extrabold text-yellow-400 mt-2"
              >
                0
              </p>
            </div>
            <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
              <h3 class="text-white/70 text-sm">Total Galeri</h3>
              <p
                id="totalGaleri"
                class="text-3xl font-extrabold text-yellow-400 mt-2"
              >
                0
              </p>
            </div>
            <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
              <h3 class="text-white/70 text-sm">Total Testimoni</h3>
              <p
                id="totalTestimoni"
                class="text-3xl font-extrabold text-yellow-400 mt-2"
              >
                0
              </p>
            </div>
          </div>
        </section>

        <section
          id="bookingSection"
          class="hidden mt-10 glass p-8 rounded-3xl reveal"
        >
          <div class="flex justify-between items-center">
            <h2 class="text-2xl font-bold text-yellow-400">Data Booking</h2>
            <button
              onclick="exportCSV()"
              class="px-5 py-2 rounded-full bg-green-500 text-black font-bold hover:bg-green-600 transition"
            >
              Export CSV
            </button>
          </div>

          <div class="overflow-x-auto mt-6">
            <table class="w-full text-sm border border-white/10">
              <thead class="bg-white/10">
                <tr>
                  <th class="p-3">Nama</th>
                  <th class="p-3">HP</th>
                  <th class="p-3">Tanggal</th>
                  <th class="p-3">Lokasi</th>
                  <th class="p-3">Paket</th>
                  <th class="p-3">Status</th>
                  <th class="p-3">Aksi</th>
                </tr>
              </thead>
              <tbody id="bookingTable"></tbody>
            </table>
          </div>
        </section>

        <section
          id="paketSection"
          class="hidden mt-10 glass p-8 rounded-3xl reveal"
        >
          <h2 class="text-2xl font-bold text-yellow-400">Manajemen Paket</h2>

          <form id="paketForm" class="grid md:grid-cols-3 gap-4 mt-6">
            <input
              id="paketNama"
              type="text"
              placeholder="Nama Paket"
              class="p-3 rounded-xl bg-white/5 border border-white/10"
            />

            <input
              id="paketHarga"
              type="number"
              placeholder="Harga (contoh 10000000)"
              class="p-3 rounded-xl bg-white/5 border border-white/10"
            />

            <input
              id="paketFitur"
              type="text"
              placeholder="Fitur Paket"
              class="p-3 rounded-xl bg-white/5 border border-white/10"
            />

            <button
              type="submit"
              class="md:col-span-3 py-3 rounded-full bg-yellow-400 text-black font-bold hover:bg-yellow-500 transition"
            >
              Tambah Paket
            </button>
          </form>

          <div id="paketList" class="mt-8 space-y-4"></div>
        </section>

        <section
          id="galeriSection"
          class="hidden mt-10 glass p-8 rounded-3xl reveal"
        >
          <h2 class="text-2xl font-bold text-yellow-400">Manajemen Galeri</h2>

          <form id="galeriForm" class="grid md:grid-cols-2 gap-4 mt-6">
            <input
              id="galeriKategori"
              type="text"
              placeholder="Kategori (Luxury/Modern/Adat)"
              class="p-3 rounded-xl bg-white/5 border border-white/10"
            />

            <input
              id="galeriUrl"
              type="text"
              placeholder="URL Gambar"
              class="p-3 rounded-xl bg-white/5 border border-white/10"
            />

            <button
              type="submit"
              class="md:col-span-2 py-3 rounded-full bg-yellow-400 text-black font-bold hover:bg-yellow-500 transition"
            >
              Tambah Foto
            </button>
          </form>

          <div id="galeriList" class="mt-8 grid md:grid-cols-3 gap-6"></div>
        </section>

        <section
          id="testimoniSection"
          class="hidden mt-10 glass p-8 rounded-3xl reveal"
        >
          <h2 class="text-2xl font-bold text-yellow-400">
            Manajemen Testimoni
          </h2>

          <form id="testimoniForm" class="grid md:grid-cols-2 gap-4 mt-6">
            <input
              id="testimoniNama"
              type="text"
              placeholder="Nama Client"
              class="p-3 rounded-xl bg-white/5 border border-white/10"
            />

            <input
              id="testimoniIsi"
              type="text"
              placeholder="Isi Testimoni"
              class="p-3 rounded-xl bg-white/5 border border-white/10"
            />

            <button
              type="submit"
              class="md:col-span-2 py-3 rounded-full bg-yellow-400 text-black font-bold hover:bg-yellow-500 transition"
            >
              Tambah Testimoni
            </button>
          </form>

          <div id="testimoniList" class="mt-8 space-y-4"></div>
        </section>
      </main>
    </div>

    <script src="assets/js/database.js"></script>
    <script src="assets/js/admin-auth.js"></script>
    <script src="assets/js/app.js"></script>

    <script>
      if (!checkAdmin()) {
        window.location.href = "admin-login.html";
      }

      function showSection(name) {
        document.getElementById("dashboardSection").classList.add("hidden");
        document.getElementById("bookingSection").classList.add("hidden");
        document.getElementById("paketSection").classList.add("hidden");
        document.getElementById("galeriSection").classList.add("hidden");
        document.getElementById("testimoniSection").classList.add("hidden");

        document.getElementById(name + "Section").classList.remove("hidden");
      }

      function loadStats() {
        document.getElementById("totalBooking").innerText =
          getData("booking").length;
        document.getElementById("totalPaket").innerText =
          getData("paket").length;
        document.getElementById("totalGaleri").innerText =
          getData("galeri").length;
        document.getElementById("totalTestimoni").innerText =
          getData("testimoni").length;
      }

      function loadBooking() {
        const booking = getData("booking");
        const table = document.getElementById("bookingTable");
        table.innerHTML = "";

        booking.forEach((b) => {
          table.innerHTML += `
          <tr class="border-b border-white/10">
            <td class="p-3">${b.nama}</td>
            <td class="p-3">${b.hp}</td>
            <td class="p-3">${b.tanggal}</td>
            <td class="p-3">${b.lokasi}</td>
            <td class="p-3">${b.paket}</td>
            <td class="p-3">${b.status}</td>
            <td class="p-3">
              <button onclick="hapusBooking(${b.id})"
                class="px-3 py-1 bg-red-600 rounded-lg hover:bg-red-700 transition">
                Hapus
              </button>
            </td>
          </tr>
        `;
        });
      }

      function hapusBooking(id) {
        let booking = getData("booking");
        booking = booking.filter((b) => b.id !== id);
        setData("booking", booking);
        loadBooking();
        loadStats();
      }

      function exportCSV() {
        const booking = getData("booking");
        let csv = "Nama,HP,Tanggal,Lokasi,Paket,Status\n";

        booking.forEach((b) => {
          csv += `${b.nama},${b.hp},${b.tanggal},${b.lokasi},${b.paket},${b.status}\n`;
        });

        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "booking_pelaminan_pixelart.csv";
        a.click();
      }

      function loadPaket() {
        const paket = getData("paket");
        const list = document.getElementById("paketList");
        list.innerHTML = "";

        paket.forEach((p) => {
          list.innerHTML += `
          <div class="p-5 rounded-2xl bg-white/5 border border-white/10 flex justify-between items-center">
            <div>
              <h3 class="font-bold text-yellow-400">${p.nama}</h3>
              <p class="text-white/70 text-sm">Rp ${Number(p.harga).toLocaleString("id-ID")}</p>
              <p class="text-white/50 text-xs mt-1">${p.fitur}</p>
            </div>
            <button onclick="hapusPaket(${p.id})"
              class="px-4 py-2 bg-red-600 rounded-xl hover:bg-red-700 transition font-bold">
              Hapus
            </button>
          </div>
        `;
        });
      }

      function hapusPaket(id) {
        let paket = getData("paket");
        paket = paket.filter((p) => p.id !== id);
        setData("paket", paket);
        loadPaket();
        loadStats();
      }

      document.getElementById("paketForm").addEventListener("submit", (e) => {
        e.preventDefault();

        let paket = getData("paket");

        paket.push({
          id: Date.now(),
          nama: document.getElementById("paketNama").value,
          harga: document.getElementById("paketHarga").value,
          fitur: document.getElementById("paketFitur").value,
        });

        setData("paket", paket);

        e.target.reset();
        loadPaket();
        loadStats();
      });

      function loadGaleri() {
        const galeri = getData("galeri");
        const list = document.getElementById("galeriList");
        list.innerHTML = "";

        galeri.forEach((g) => {
          list.innerHTML += `
          <div class="rounded-2xl overflow-hidden bg-white/5 border border-white/10">
            <img src="${g.url}" class="w-full h-40 object-cover">
            <div class="p-4 flex justify-between items-center">
              <p class="text-yellow-400 font-bold text-sm">${g.kategori}</p>
              <button onclick="hapusGaleri(${g.id})"
                class="px-3 py-1 bg-red-600 rounded-lg hover:bg-red-700 transition">
                Hapus
              </button>
            </div>
          </div>
        `;
        });
      }

      function hapusGaleri(id) {
        let galeri = getData("galeri");
        galeri = galeri.filter((g) => g.id !== id);
        setData("galeri", galeri);
        loadGaleri();
        loadStats();
      }

      document.getElementById("galeriForm").addEventListener("submit", (e) => {
        e.preventDefault();

        let galeri = getData("galeri");

        galeri.push({
          id: Date.now(),
          kategori: document.getElementById("galeriKategori").value,
          url: document.getElementById("galeriUrl").value,
        });

        setData("galeri", galeri);

        e.target.reset();
        loadGaleri();
        loadStats();
      });

      function loadTestimoni() {
        const testimoni = getData("testimoni");
        const list = document.getElementById("testimoniList");
        list.innerHTML = "";

        testimoni.forEach((t) => {
          list.innerHTML += `
          <div class="p-5 rounded-2xl bg-white/5 border border-white/10 flex justify-between items-center">
            <div>
              <h3 class="font-bold text-yellow-400">${t.nama}</h3>
              <p class="text-white/70 text-sm">${t.isi}</p>
            </div>
            <button onclick="hapusTestimoni(${t.id})"
              class="px-4 py-2 bg-red-600 rounded-xl hover:bg-red-700 transition font-bold">
              Hapus
            </button>
          </div>
        `;
        });
      }

      function hapusTestimoni(id) {
        let testimoni = getData("testimoni");
        testimoni = testimoni.filter((t) => t.id !== id);
        setData("testimoni", testimoni);
        loadTestimoni();
        loadStats();
      }

      document
        .getElementById("testimoniForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();

          let testimoni = getData("testimoni");

          testimoni.push({
            id: Date.now(),
            nama: document.getElementById("testimoniNama").value,
            isi: document.getElementById("testimoniIsi").value,
          });

          setData("testimoni", testimoni);

          e.target.reset();
          loadTestimoni();
          loadStats();
        });

      loadStats();
      loadBooking();
      loadPaket();
      loadGaleri();
      loadTestimoni();
    </script>
  </body>
</html>
